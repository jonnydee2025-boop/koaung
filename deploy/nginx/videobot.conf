# VideoBot — nginx site
# Install: sudo cp deploy/nginx/videobot.conf /etc/nginx/sites-available/videobot
# Enable:  sudo ln -sf /etc/nginx/sites-available/videobot /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx
# TLS:     sudo certbot --nginx -d YOUR_DOMAIN.com

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.com;

    # certbot will add HTTPS server block; keep this for HTTP→HTTPS redirect after certbot

    root /opt/videobot/admin-panel/dist;
    index index.html;

    # React SPA — client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin API → Python bot (localhost only)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for FFmpeg render + YouTube upload
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # Optional: block direct access to Swagger in production
    location /docs {
        return 404;
    }
    location /openapi.json {
        return 404;
    }
}
